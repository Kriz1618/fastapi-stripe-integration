[tool.black]
line-length = 88
target-version = ['py39', 'py310', 'py311']
include = '\.pyi?$'
extend-exclude = '''
/(
    # directories
    \.eggs
    | \.git
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | venv
    | _build
    | buck-out
    | build
    | dist
)/
'''

[tool.isort]
profile = "black"
multi_line_output = 3
include_trailing_comma = true
force_grid_wrap = 0
use_parentheses = true
ensure_newline_before_comments = true
line_length = 88
skip_glob = ["venv/*", ".venv/*", "env/*", ".env/*"]

[tool.mypy]
python_version = "3.9"
warn_return_any = false
warn_unused_configs = false
disallow_untyped_defs = false
ignore_missing_imports = true
no_implicit_optional = false
allow_redefinition = true
disable_error_code = ["call-arg", "assignment", "attr-defined", "no-any-return", "return-value", "arg-type", "operator"]
exclude = [
    "venv/",
    ".venv/",
    "env/",
    ".env/",
    "build/",
    "dist/"
]

# Configuración específica para diferentes directorios
[[tool.mypy.overrides]]
module = "app.*"
disallow_untyped_defs = false
check_untyped_defs = false
ignore_errors = true

[[tool.mypy.overrides]]
module = "tests.*"
ignore_errors = true
